services:
  postgres:
    image: postgres:16-alpine
    container_name: eiscord-postgres
    environment:
      POSTGRES_USER: eiscord
      POSTGRES_PASSWORD: eiscord
      POSTGRES_DB: eiscord
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eiscord -d eiscord"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eiscord-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: eiscord-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: eiscord-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: eiscord-local
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    volumes:
      - ./docker/minio/create-bucket.sh:/create-bucket.sh:ro
    entrypoint: ["/bin/sh", "/create-bucket.sh"]

  coturn:
    image: coturn/coturn:latest
    container_name: eiscord-coturn
    network_mode: host
    volumes:
      - ./docker/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]
    restart: unless-stopped

  mediasoup:
    image: node:22-bookworm-slim
    container_name: eiscord-mediasoup
    working_dir: /app
    network_mode: host
    environment:
      MEDIASOUP_LISTEN_IP: ${MEDIASOUP_LISTEN_IP:-127.0.0.1}
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:-}
      MEDIASOUP_NUM_WORKERS: ${MEDIASOUP_NUM_WORKERS:-1}
      MEDIASOUP_RTC_MIN_PORT: ${MEDIASOUP_RTC_MIN_PORT:-40000}
      MEDIASOUP_RTC_MAX_PORT: ${MEDIASOUP_RTC_MAX_PORT:-40100}
      MEDIA_HEALTH_PORT: 3001
    volumes:
      - .:/app
    command: ["node", "apps/media/dist/main.js"]
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
