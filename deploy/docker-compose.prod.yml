name: ${COMPOSE_PROJECT_NAME:-eiscord}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
      MINIO_SERVER_URL: ${S3_ENDPOINT:?set S3_ENDPOINT}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
      PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:?set PUBLIC_WEB_ORIGIN}
    volumes:
      - ./minio/init.sh:/deploy/minio/init.sh:ro
    entrypoint: ["/bin/sh", "/deploy/minio/init.sh"]

  api:
    image: ${API_IMAGE:-eiscord-api:prod}
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:?set PUBLIC_API_BASE_URL}
      PUBLIC_REALTIME_URL: ${PUBLIC_REALTIME_URL:?set PUBLIC_REALTIME_URL}
      PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:?set PUBLIC_WEB_ORIGIN}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-10485760}
      SERVER_MEMBER_LIMIT: ${SERVER_MEMBER_LIMIT:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PRESENCE_SWEEP_INTERVAL_MS: ${PRESENCE_SWEEP_INTERVAL_MS:-5000}
      PRESENCE_OFFLINE_GRACE_MS: ${PRESENCE_OFFLINE_GRACE_MS:-45000}
      MEDIASOUP_LISTEN_IP: 0.0.0.0
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:?set MEDIASOUP_ANNOUNCED_IP}
      MEDIASOUP_RTC_MIN_PORT: 40000
      MEDIASOUP_RTC_MAX_PORT: 40100
      MEDIASOUP_NUM_WORKERS: ${MEDIASOUP_NUM_WORKERS:-2}
      MEDIA_HEALTH_PORT: ${MEDIA_HEALTH_PORT:-3001}
      MEDIA_WORKER_ENTRY: /app/apps/media/dist/main.js
      TURN_URL: ${TURN_URL:?set TURN_URL}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET:?set TURN_SHARED_SECRET}
      TURN_CREDENTIAL_TTL_SECONDS: ${TURN_CREDENTIAL_TTL_SECONDS:-300}
      VOICE_MAX_PARTICIPANTS_PER_ROOM: ${VOICE_MAX_PARTICIPANTS_PER_ROOM:-20}
      VOICE_NEGOTIATION_TIMEOUT_MS: ${VOICE_NEGOTIATION_TIMEOUT_MS:-30000}
      VOICE_NEGOTIATION_SWEEP_INTERVAL_MS: ${VOICE_NEGOTIATION_SWEEP_INTERVAL_MS:-5000}
      SMTP_HOST: ${SMTP_HOST:?set SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:?set SMTP_PORT}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:?set SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Eiscord}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-15}
      PASSWORD_RESET_RESEND_COOLDOWN_SECONDS: ${PASSWORD_RESET_RESEND_COOLDOWN_SECONDS:-60}
      PASSWORD_RESET_MAX_ATTEMPTS: ${PASSWORD_RESET_MAX_ATTEMPTS:-5}
    ports:
      - "40000-40100:40000-40100/udp"
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "${S3_PUBLIC_DOMAIN:?set S3_PUBLIC_DOMAIN}:host-gateway"

  migrate:
    image: ${API_IMAGE:-eiscord-api:prod}
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    profiles: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}
    command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy", "--schema=prisma/schema.prisma"]

  caddy:
    image: ${WEB_IMAGE:-eiscord-web:prod}
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
      args:
        PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:?set PUBLIC_API_BASE_URL}
        PUBLIC_REALTIME_URL: ${PUBLIC_REALTIME_URL:?set PUBLIC_REALTIME_URL}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
      PUBLIC_WEB_DOMAIN: ${PUBLIC_WEB_DOMAIN:?set PUBLIC_WEB_DOMAIN}
      S3_PUBLIC_DOMAIN: ${S3_PUBLIC_DOMAIN:?set S3_PUBLIC_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    networks:
      default:
        aliases:
          - ${PUBLIC_WEB_DOMAIN:?set PUBLIC_WEB_DOMAIN}
          - ${S3_PUBLIC_DOMAIN:?set S3_PUBLIC_DOMAIN}

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    command:
      - --listening-port=3478
      - --fingerprint
      - --lt-cred-mech
      - --use-auth-secret
      - --static-auth-secret=${TURN_SHARED_SECRET:?set TURN_SHARED_SECRET}
      - --realm=${TURN_REALM:?set TURN_REALM}
      - --server-name=${TURN_REALM:?set TURN_REALM}
      - --external-ip=${MEDIASOUP_ANNOUNCED_IP:?set MEDIASOUP_ANNOUNCED_IP}
      - --min-port=${TURN_RELAY_MIN_PORT:-49160}
      - --max-port=${TURN_RELAY_MAX_PORT:-49200}
      - --no-multicast-peers
      - --no-stun-backward-compatibility
      - --no-tlsv1
      - --no-tlsv1_1
      - --log-file=stdout

volumes:
  postgres-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
